<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — address_book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f5ff; --panel: #ede8fa; --card: #ffffff;
      --border: #d0c0f0; --accent: #7c3aed; --accent3: #6d28d9;
      --text: #1e0a3c; --muted: #9c7cc0; --red: #ff4d6d;
      --mono: 'DM Mono', monospace;
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 1rem;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header .tag {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .1em;
      margin-bottom: .4rem;
    }
    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -.5px;
    }
    .login-header h1 span { color: var(--accent); }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 6px;
      padding: 2rem;
    }
    .field { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: .73rem;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    input {
      width: 100%;
      font-family: var(--mono);
      font-size: .9rem;
      padding: .6rem .85rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); background: #fff; }
    .btn-login {
      width: 100%;
      margin-top: .5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: .9rem;
      font-weight: 500;
      padding: .75rem;
      cursor: pointer;
      transition: background .15s;
      letter-spacing: .02em;
    }
    .btn-login:hover { background: var(--accent3); }
    .error-msg {
      background: #fff0f3;
      border: 1px solid var(--red);
      border-radius: 4px;
      color: #9b1c1c;
      font-size: .8rem;
      padding: .55rem .85rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .hint {
      margin-top: 1.5rem;
      text-align: center;
      font-size: .72rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="tag">[ SQLite · Flask ]</div>
      <h1>address_<span>book</span></h1>
    </div>
    <div class="login-card">
      {% if error %}
        <div class="error-msg">✕ {{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="field">
          <label>identifiant</label>
          <input type="text" name="username" autofocus autocomplete="username" />
        </div>
        <div class="field">
          <label>mot de passe</label>
          <input type="password" name="password" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login">→ connexion</button>
      </form>
    </div>
    <div class="hint">mot de passe oublié ?</div>
  </div>
</body>
</html>
